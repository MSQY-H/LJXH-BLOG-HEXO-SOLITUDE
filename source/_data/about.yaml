  tip: 心理
  title: 说几句话
  content:
    <br>一开始，在家里无聊，突然想到可以建一个博客，便做了这个博客。
    <br>
    其实这里是我的博客的第二个主题了。<del>博客的意义不就是折腾吗，文章什么的不重要</del>以后文章多了之后可能会跑路到 Astro 或 Vitepress。
    <br>
    这里将会有各种各样的东西，想到什么就写什么，不会局限于某一方面。
    <br>
    最后，欢迎大家来到 MSQY 的博客！玩得愉快！
    <br>

